<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý vé - Staff</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fa; min-height: 100vh; }
        .sidebar { height: 100vh; background: #2c3e50; color: white; position: fixed; width: 250px; padding-top: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 1000; overflow-y: auto; }
        .sidebar .logo { text-align: center; margin-bottom: 30px; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar .logo h3 { font-size: 20px; font-weight: 600; margin-bottom: 5px; color: white; }
        .sidebar .logo p { font-size: 12px; opacity: 0.7; }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; text-decoration: none; transition: all 0.2s ease; border-left: 3px solid transparent; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,0.1); border-left-color: #3498db; color: white; }
        .sidebar .nav-link i { width: 18px; text-align: center; }
        .sidebar .divider { height: 1px; background: rgba(255,255,255,0.1); margin: 15px 0; }
        .sidebar .logout-form { margin: 0; padding: 0; }
        .sidebar .logout-btn { color: rgba(255,255,255,0.8); padding: 12px 20px; border: none; background: none; width: 100%; text-align: left; transition: all 0.2s ease; border-left: 3px solid transparent; display: flex; align-items: center; gap: 10px; font-size: 14px; cursor: pointer; }
        .sidebar .logout-btn:hover { background: rgba(255,255,255,0.1); border-left-color: #e74c3c; color: white; }
        .content { margin-left: 250px; padding: 30px; }
        .header { background: white; padding: 20px 30px; border-radius: 8px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
        .header h2 { margin: 0; color: #2c3e50; font-weight: 600; font-size: 24px; }
        .table-box { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .table td, .table th { vertical-align: middle; padding: 12px 16px; }
        .table thead th { background: #3498db; color: white; border: none; font-weight: 500; font-size: 14px; }
        .badge-warning { background: #f39c12; color: white; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .badge-success { background: #27ae60; color: white; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .badge-danger { background: #e74c3c; color: white; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .btn-sm { padding: 6px 12px; border-radius: 4px; font-size: 13px; border: none; cursor: pointer; }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #229954; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-info { background: #3498db; color: white; }
        .btn-info:hover { background: #2980b9; }
        .alert { border-radius: 6px; border: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <h3><i class="fas fa-bus"></i> Bus Ticket Pro</h3>
        <p>Hệ thống quản lý</p>
    </div>

    <a href="/staff" class="nav-link">
        <i class="fas fa-tachometer-alt"></i><span>Dashboard</span>
    </a>
    <a href="/staff/tickets" class="nav-link active">
        <i class="fas fa-ticket-alt"></i><span>Quản lý vé</span>
    </a>

    <div class="divider"></div>

    <a href="/profile" class="nav-link">
        <i class="fas fa-user-cog"></i><span>Hồ sơ cá nhân</span>
    </a>

    <div class="divider"></div>

    <form th:action="@{/auth/logout}" method="post" class="logout-form">
        <button type="submit" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i><span>Đăng xuất</span>
        </button>
    </form>
</div>

<div class="content">
    <div class="header">
        <div class="d-flex align-items-center gap-3">
            <a href="/staff" class="btn btn-secondary">
                <i class="fas fa-arrow-left me-1"></i> Quay lại
            </a>
            <h2>Quản lý vé</h2>
        </div>
    </div>

    <div class="table-box">
        <table class="table table-hover">
            <thead>
            <tr>
                <th>Mã vé</th>
                <th>Hành khách</th>
                <th>Số điện thoại</th>
                <th>Tuyến đường</th>
                <th>Ghế</th>
                <th>Giờ khởi hành</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="ticket : ${tickets}">
                <td th:text="${ticket.ticketCode}"></td>
                <td th:text="${ticket.passengerName}"></td>
                <td th:text="${ticket.passengerPhone}"></td>
                <td th:text="${ticket.departurePoint + ' → ' + ticket.destination}"></td>
                <td th:text="${ticket.seatNumber != null ? ticket.seatNumber : '-'}"></td>
                <td th:text="${ticket.departureTime != null ? #temporals.format(ticket.departureTime, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                <td>
                    <span th:if="${ticket.ticketStatus == 'PENDING'}" class="badge-warning">
                        <i class="fas fa-clock me-1"></i> Chờ thanh toán
                    </span>
                    <span th:if="${ticket.ticketStatus == 'PAID'}" class="badge-success">
                        <i class="fas fa-check-circle me-1"></i> Đã thanh toán
                    </span>
                    <span th:if="${ticket.ticketStatus == 'CANCELLED'}" class="badge-danger">
                        <i class="fas fa-times-circle me-1"></i> Đã hủy
                    </span>
                </td>
                <td>
                    <div th:if="${ticket.ticketStatus == 'PENDING'}" style="display:flex;gap:8px;">
                        <button th:onclick="'confirmTicket(' + ${ticket.id} + ')'" class="btn-sm btn-success">
                            <i class="fas fa-check me-1"></i> Xác nhận
                        </button>
                        <button th:onclick="'cancelTicket(' + ${ticket.id} + ')'" class="btn-sm btn-danger">
                            <i class="fas fa-times me-1"></i> Hủy
                        </button>
                    </div>
                    <span th:unless="${ticket.ticketStatus == 'PENDING'}" class="text-muted">-</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(tickets)}">
                <td colspan="8" class="text-center text-muted py-4">Chưa có vé nào</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function confirmTicket(id) {
        if (confirm('Bạn có chắc muốn xác nhận vé này?')) {
            fetch(`/staff/tickets/${id}/confirm`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.text())
            .then(data => {
                if (data === 'success') {
                    alert('✅ Xác nhận vé thành công!');
                    location.reload();
                } else {
                    alert('❌ Lỗi: ' + data);
                }
            })
            .catch(error => {
                alert('❌ Lỗi: ' + error);
            });
        }
    }

    function cancelTicket(id) {
        if (confirm('Bạn có chắc muốn hủy vé này?')) {
            fetch(`/staff/tickets/${id}/cancel`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.text())
            .then(data => {
                if (data === 'success') {
                    alert('✅ Hủy vé thành công!');
                    location.reload();
                } else {
                    alert('❌ Lỗi: ' + data);
                }
            })
            .catch(error => {
                alert('❌ Lỗi: ' + error);
            });
        }
    }
</script>

</body>
</html>
