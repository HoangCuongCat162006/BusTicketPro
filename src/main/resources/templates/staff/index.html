<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Staff Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: #f4f8fb;
        }

        .sidebar{
            width: 250px;
            height: 100vh;
            background: #0d6efd;
            position: fixed;
            color: white;
            padding: 30px 20px;
        }

        .sidebar h3{
            font-weight: bold;
            margin-bottom: 30px;
        }

        .sidebar a{
            display: block;
            color: white;
            padding: 12px 0;
            text-decoration: none;
        }

        .sidebar a:hover{
            opacity: 0.8;
        }

        .content{
            margin-left: 250px;
            padding: 40px;
        }

        .card{
            border: none;
            border-radius: 15px;
        }

    </style>
</head>

<body>

<div class="sidebar">

    <h3>STAFF PANEL</h3>

    <a href="#">Dashboard</a>
    <a href="#">Quản lý chuyến xe</a>
    <a href="#">Quản lý vé</a>
    <a href="#">Khách hàng</a>
    <a href="/logout">Đăng xuất</a>

</div>

<div class="content">

    <h2 class="mb-4">Trang nhân viên</h2>

    <div class="row">

        <div class="col-md-4">

            <div class="card shadow p-4">
                <h5>Tổng vé hôm nay</h5>
                <h2>120</h2>
            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow p-4">
                <h5>Chuyến đang hoạt động</h5>
                <h2>18</h2>
            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow p-4">
                <h5>Khách hàng</h5>
                <h2>350</h2>
            </div>

        </div>

    </div>

</div>

</body>
</html>
