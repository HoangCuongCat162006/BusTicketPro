<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: #f4f8fb;
        }

        .sidebar{
            height: 100vh;
            background: #0d6efd;
            color: white;
            position: fixed;
            width: 230px;
            padding-top: 30px;
        }

        .sidebar h3{
            text-align: center;
            margin-bottom: 40px;
            font-weight: bold;
        }

        .sidebar a{
            color: white;
            display: block;
            padding: 15px 25px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover{
            background: rgba(255,255,255,0.2);
        }

        .content{
            margin-left: 230px;
            padding: 40px;
        }

        .card-box{
            border: none;
            border-radius: 15px;
        }

    </style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

    <h3>ADMIN</h3>

    <a href="/admin/dashboard">Dashboard</a>

    <a href="/admin/buses">Quản lý xe</a>

    <a href="/admin/routes">Quản lý tuyến</a>

    <a href="/admin/trips">Quản lý chuyến</a>

    <a href="/admin/tickets">Quản lý vé</a>

    <a href="/logout">Đăng xuất</a>

</div>

<!-- Content -->
<div class="content">

    <h2 class="mb-4">Dashboard Admin</h2>

    <div class="row">

        <div class="col-md-4">

            <div class="card shadow card-box">

                <div class="card-body">

                    <h5>Tổng xe</h5>

                    <h2>15</h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow card-box">

                <div class="card-body">

                    <h5>Tổng chuyến</h5>

                    <h2>45</h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow card-box">

                <div class="card-body">

                    <h5>Tổng vé</h5>

                    <h2>560</h2>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
