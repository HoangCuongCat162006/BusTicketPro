<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý xe - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        
        .sidebar {
            height: 100vh;
            background: #2c3e50;
            color: white;
            position: fixed;
            width: 250px;
            padding-top: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        
        .sidebar .logo {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .sidebar .logo h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
            color: white;
        }
        
        .sidebar .logo p {
            font-size: 12px;
            opacity: 0.7;
        }
        
        .sidebar .nav-link {
            color: rgba(255,255,255,0.8);
            padding: 12px 20px;
            text-decoration: none;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: rgba(255,255,255,0.1);
            border-left-color: #3498db;
            color: white;
        }
        
        .sidebar .nav-link i {
            width: 18px;
            text-align: center;
        }
        
        .sidebar .divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 15px 0;
        }
        
        .content {
            margin-left: 250px;
            padding: 30px;
        }
        
        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h2 {
            margin: 0;
            color: #2c3e50;
            font-weight: 600;
            font-size: 24px;
        }
        
        .table-box {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .table td,
        .table th {
            vertical-align: middle;
            padding: 12px 16px;
        }
        
        .table thead th {
            background: #3498db;
            color: white;
            border: none;
            font-weight: 500;
            font-size: 14px;
        }
        
        .badge-active {
            background: #27ae60;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-inactive {
            background: #e74c3c;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .btn-primary {
            background: #3498db;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            padding: 10px 20px;
            transition: all 0.2s ease;
        }
        
        .btn-primary:hover {
            background: #2980b9;
        }
        
        .btn-sm {
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
        }
        
        .btn-warning {
            background: #f39c12;
            border: none;
        }
        
        .btn-warning:hover {
            background: #e67e22;
        }
        
        .btn-danger {
            background: #e74c3c;
            border: none;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .alert {
            border-radius: 6px;
            border: none;
            font-size: 14px;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo">
        <h3><i class="fas fa-bus"></i> Bus Ticket Pro</h3>
        <p>Hệ thống quản lý</p>
    </div>
    
    <a href="/admin/dashboard" class="nav-link">
        <i class="fas fa-tachometer-alt"></i>
        <span>Dashboard</span>
    </a>
    
    <a href="/admin/buses" class="nav-link active">
        <i class="fas fa-bus"></i>
        <span>Quản lý xe</span>
    </a>
    
    <a href="/admin/routes" class="nav-link">
        <i class="fas fa-route"></i>
        <span>Quản lý tuyến</span>
    </a>
    
    <a href="/admin/trips" class="nav-link">
        <i class="fas fa-calendar-alt"></i>
        <span>Quản lý chuyến</span>
    </a>
    
    <a href="/admin/tickets" class="nav-link">
        <i class="fas fa-ticket-alt"></i>
        <span>Quản lý vé</span>
    </a>
    
    <div class="divider"></div>
    
    <a href="/admin/init" class="nav-link">
        <i class="fas fa-database"></i>
        <span>Khởi tạo dữ liệu</span>
    </a>
    
    <div class="divider"></div>
    
    <a href="/login" class="nav-link">
        <i class="fas fa-sign-out-alt"></i>
        <span>Đăng xuất</span>
    </a>
</div>

<!-- Content -->
<div class="content">
    <div class="header">
        <h2>Quản lý xe</h2>
        <a href="/admin/buses/create" class="btn btn-primary">
            <i class="fas fa-plus me-2"></i> Thêm xe
        </a>
    </div>
    
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    
    <div class="table-box">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Biển số</th>
                    <th>Loại xe</th>
                    <th>Số ghế</th>
                    <th>Trạng thái</th>
                    <th width="200">Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="bus : ${buses}">
                    <td th:text="${bus.id}"></td>
                    <td th:text="${bus.busNumber}"></td>
                    <td th:text="${bus.type}"></td>
                    <td th:text="${bus.capacity}"></td>
                    <td>
                        <span th:if="${bus.active}" class="badge-active">
                            <i class="fas fa-check-circle me-1"></i> Đang hoạt động
                        </span>
                        <span th:unless="${bus.active}" class="badge-inactive">
                            <i class="fas fa-times-circle me-1"></i> Ngừng hoạt động
                        </span>
                    </td>
                    <td>
                        <a th:href="@{/admin/buses/edit/{id}(id=${bus.id})}" class="btn btn-warning btn-sm me-2">
                            <i class="fas fa-edit me-1"></i> Sửa
                        </a>
                        <a th:href="@{/admin/buses/delete/{id}(id=${bus.id})}" class="btn btn-danger btn-sm"
                           onclick="return confirm('Bạn có chắc muốn xóa xe này?')">
                            <i class="fas fa-trash-alt me-1"></i> Xóa
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
