<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý tuyến</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: #f4f8fb;
        }

        .table-box{
            background: white;
            padding: 25px;
            border-radius: 15px;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-4">

        <h2>Quản lý tuyến đường</h2>

        <a href="/admin/routes/create"
           class="btn btn-primary">

            + Thêm tuyến

        </a>

    </div>

    <div class="mb-3">

        <a href="/admin/dashboard"
           class="btn btn-secondary">

            ← Quay lại Dashboard

        </a>

    </div>

    <div class="table-box shadow">

        <table class="table table-bordered">

            <thead class="thead-dark">

            <tr>

                <th>ID</th>
                <th>Điểm đi</th>
                <th>Điểm đến</th>
                <th>Khoảng cách</th>
                <th>Hành động</th>

            </tr>

            </thead>

            <tbody>

            <tr>
                <td>1</td>
                <td>Hà Nội</td>
                <td>Đà Nẵng</td>
                <td>760 km</td>

                <td>

                    <button class="btn btn-warning btn-sm">
                        Sửa
                    </button>

                    <button class="btn btn-danger btn-sm">
                        Xóa
                    </button>

                </td>
            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
