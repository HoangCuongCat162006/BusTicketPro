<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm tuyến</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f4f8fb;">

<div class="container">

    <div class="card shadow mt-5 mx-auto"
         style="max-width:600px; border-radius:15px;">

        <div class="card-body p-4">

            <a href="/admin/routes"
               class="btn btn-secondary mb-3">

                ← Quay lại

            </a>

            <h3 class="mb-4">Thêm tuyến đường</h3>

            <form>

                <div class="form-group">
                    <label>Điểm đi</label>
                    <input type="text"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Điểm đến</label>
                    <input type="text"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label>Khoảng cách</label>
                    <input type="text"
                           class="form-control">
                </div>

                <button class="btn btn-primary btn-block">

                    Lưu tuyến đường

                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
