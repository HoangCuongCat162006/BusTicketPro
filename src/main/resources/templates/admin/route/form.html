<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Tuyến đường - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fa; min-height: 100vh; }
        .sidebar { height: 100vh; background: #2c3e50; color: white; position: fixed; width: 250px; padding-top: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 1000; overflow-y: auto; }
        .sidebar .logo { text-align: center; margin-bottom: 30px; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar .logo h3 { font-size: 20px; font-weight: 600; margin-bottom: 5px; color: white; }
        .sidebar .logo p { font-size: 12px; opacity: 0.7; }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; text-decoration: none; transition: all 0.2s ease; border-left: 3px solid transparent; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,0.1); border-left-color: #3498db; color: white; }
        .sidebar .nav-link i { width: 18px; text-align: center; }
        .sidebar .divider { height: 1px; background: rgba(255,255,255,0.1); margin: 15px 0; }
        .sidebar .logout-form { margin: 0; padding: 0; }
        .sidebar .logout-btn { color: rgba(255,255,255,0.8); padding: 12px 20px; border: none; background: none; width: 100%; text-align: left; transition: all 0.2s ease; border-left: 3px solid transparent; display: flex; align-items: center; gap: 10px; font-size: 14px; cursor: pointer; }
        .sidebar .logout-btn:hover { background: rgba(255,255,255,0.1); border-left-color: #e74c3c; color: white; }
        .content { margin-left: 250px; padding: 30px; }
        .header { background: white; padding: 20px 30px; border-radius: 8px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
        .header h2 { margin: 0; color: #2c3e50; font-weight: 600; font-size: 24px; }
        .form-box { background: white; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .form-label { font-weight: 500; color: #34495e; font-size: 14px; margin-bottom: 8px; }
        .form-control { border-radius: 6px; border: 1px solid #e0e0e0; padding: 10px 14px; font-size: 14px; }
        .form-control:focus { border-color: #3498db; box-shadow: 0 0 0 3px rgba(52,152,219,0.1); outline: none; }
        .btn-primary { background: #3498db; border: none; border-radius: 6px; font-weight: 500; padding: 10px 20px; transition: all 0.2s ease; }
        .btn-primary:hover { background: #2980b9; }
        .btn-secondary { background: #95a5a6; border: none; border-radius: 6px; font-weight: 500; padding: 10px 20px; }
        .btn-secondary:hover { background: #7f8c8d; }
        .alert { border-radius: 6px; border: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <h3><i class="fas fa-bus"></i> Bus Ticket Pro</h3>
        <p>Hệ thống quản lý</p>
    </div>

    <a href="/admin/dashboard" class="nav-link">
        <i class="fas fa-tachometer-alt"></i><span>Dashboard</span>
    </a>
    <a href="/admin/buses" class="nav-link">
        <i class="fas fa-bus"></i><span>Quản lý xe</span>
    </a>
    <a href="/admin/routes" class="nav-link active">
        <i class="fas fa-route"></i><span>Quản lý tuyến</span>
    </a>
    <a href="/admin/trips" class="nav-link">
        <i class="fas fa-calendar-alt"></i><span>Quản lý chuyến</span>
    </a>
    <a href="/admin/tickets" class="nav-link">
        <i class="fas fa-ticket-alt"></i><span>Quản lý vé</span>
    </a>

    <div class="divider"></div>

    <a href="/admin/init" class="nav-link">
        <i class="fas fa-database"></i><span>Khởi tạo dữ liệu</span>
    </a>
    <a href="/profile" class="nav-link">
        <i class="fas fa-user-cog"></i><span>Hồ sơ cá nhân</span>
    </a>

    <div class="divider"></div>

    <form th:action="@{/auth/logout}" method="post" class="logout-form">
        <button type="submit" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i><span>Đăng xuất</span>
        </button>
    </form>
</div>

<div class="content">
    <div class="header">
        <h2 th:text="${pageTitle}">Tuyến đường</h2>
        <a href="/admin/routes" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-2"></i> Quay lại
        </a>
    </div>

    <div th:if="${error}" class="alert alert-danger mb-3" th:text="${error}"></div>

    <div class="form-box">
        <form th:action="@{/admin/routes/save}" method="post" th:object="${route}">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label for="departure" class="form-label">Điểm đi</label>
                <select th:field="*{departure.id}" id="departure" class="form-control" required>
                    <option value="">-- Chọn điểm đi --</option>
                    <option th:each="loc : ${locations}"
                            th:value="${loc.id}"
                            th:text="${loc.name}">
                    </option>
                </select>
            </div>

            <div class="mb-3">
                <label for="arrival" class="form-label">Điểm đến</label>
                <select th:field="*{arrival.id}" id="arrival" class="form-control" required>
                    <option value="">-- Chọn điểm đến --</option>
                    <option th:each="loc : ${locations}"
                            th:value="${loc.id}"
                            th:text="${loc.name}">
                    </option>
                </select>
            </div>

            <div class="mb-3">
                <label for="distance" class="form-label">Khoảng cách (km)</label>
                <input type="number" th:field="*{distance}" id="distance"
                       class="form-control" placeholder="Nhập khoảng cách" min="1" required>
            </div>

            <div class="mb-3">
                <label for="duration" class="form-label">Thời gian di chuyển (phút)</label>
                <input type="number" th:field="*{duration}" id="duration"
                       class="form-control" placeholder="Nhập thời gian di chuyển" min="1">
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-save me-2"></i> Lưu tuyến đường
            </button>
        </form>
    </div>
</div>

</body>
</html>
