<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 35px;
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .logo-section h1 {
            font-size: 24px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }
        
        .logo-section p {
            color: #7f8c8d;
            font-size: 14px;
        }
        
        .form-label {
            font-weight: 500;
            color: #34495e;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .form-control {
            height: 42px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            padding: 10px 14px;
            font-size: 14px;
        }
        
        .form-control:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
            outline: none;
        }
        
        .form-control::placeholder {
            color: #adb5bd;
        }
        
        .btn-login {
            height: 42px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 15px;
            background: #3498db;
            border: none;
            transition: all 0.2s ease;
        }
        
        .btn-login:hover {
            background: #2980b9;
        }
        
        .alert {
            border-radius: 6px;
            border: none;
            font-size: 14px;
        }
        
        .input-group-text {
            background: #f8f9fa;
            border: 1px solid #e0e0e0;
            border-right: none;
            border-radius: 6px 0 0 6px;
        }
        
        .input-group .form-control {
            border-left: none;
            border-radius: 0 6px 6px 0;
        }
        
        .input-group:focus-within .input-group-text {
            border-color: #3498db;
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e9ecef;
        }
        
        .divider::before {
            left: 0;
        }
        
        .divider::after {
            right: 0;
        }
        
        .divider span {
            background: white;
            padding: 0 15px;
            color: #adb5bd;
            font-size: 13px;
        }
        
        .register-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .register-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="logo-section">
            <h1><i class="fas fa-bus"></i> Bus Ticket Pro</h1>
            <p>Đăng nhập để tiếp tục</p>
        </div>

        <!-- Success message from register -->
        <div th:if="${success}" class="alert alert-success text-center" role="alert">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <!-- Error from Spring Security -->
        <div th:if="${param.error}" class="alert alert-danger text-center" role="alert">
            <i class="fas fa-exclamation-circle"></i> Sai tên đăng nhập hoặc mật khẩu. Vui lòng thử lại.
        </div>

        <!-- Logout message -->
        <div th:if="${param.logout}" class="alert alert-info text-center" role="alert">
            <i class="fas fa-sign-out-alt"></i> Bạn đã đăng xuất thành công.
        </div>

        <form th:action="@{/login}" method="post" id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-user text-muted"></i>
                    </span>
                    <input type="text"
                           class="form-control"
                           name="username"
                           id="username"
                           placeholder="Nhập username"
                           required>
                </div>
                <div class="text-danger mt-1" id="usernameError" style="font-size: 13px;"></div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-lock text-muted"></i>
                    </span>
                    <input type="password"
                           class="form-control"
                           name="password"
                           id="password"
                           placeholder="Nhập mật khẩu"
                           required>
                </div>
                <div class="text-danger mt-1" id="passwordError" style="font-size: 13px;"></div>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-login">
                <i class="fas fa-sign-in-alt me-2"></i> Đăng Nhập
            </button>
        </form>

        <div class="divider">
            <span>hoặc</span>
        </div>

        <div class="register-link">
            Chưa có tài khoản? 
            <a href="/register">Đăng ký ngay</a>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById("loginForm");
    const username = document.getElementById("username");
    const password = document.getElementById("password");
    const usernameError = document.getElementById("usernameError");
    const passwordError = document.getElementById("passwordError");

    form.addEventListener("submit", function (e) {
        let isValid = true;

        // Reset errors
        usernameError.innerText = "";
        passwordError.innerText = "";
        username.classList.remove("is-invalid");
        password.classList.remove("is-invalid");

        if (username.value.trim() === "") {
            usernameError.innerText = "Username không được để trống";
            username.classList.add("is-invalid");
            isValid = false;
        }

        if (password.value.trim() === "") {
            passwordError.innerText = "Mật khẩu không được để trống";
            password.classList.add("is-invalid");
            isValid = false;
        }

        if (!isValid) {
            e.preventDefault();
        }
    });
</script>

</body>
</html>
