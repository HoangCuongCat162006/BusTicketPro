<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f4f8fb, #e9f0f7);
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-box {
            max-width: 420px;
            margin: auto;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .card-body {
            padding: 40px;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #0d6efd;
        }
        .form-control {
            height: 48px;
            border-radius: 10px;
        }
        .btn-login {
            height: 48px;
            border-radius: 10px;
            font-weight: bold;
            background: #0d6efd;
        }
        .btn-login:hover {
            background: #0b5ed7;
        }
        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
        }
        .input-error {
            border: 2px solid #dc3545 !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="login-box">
        <div class="card">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="logo">Bus Ticket Pro</div>
                    <p class="text-muted mt-2">Đăng nhập để tiếp tục</p>
                </div>

                <!-- Thông báo thành công từ register -->
                <div th:if="${success}" class="alert alert-success text-center" th:text="${success}"></div>

                <!-- Lỗi từ Spring Security -->
                <div th:if="${param.error}" class="alert alert-danger text-center">
                    Sai tên đăng nhập hoặc mật khẩu. Vui lòng thử lại.
                </div>

                <!-- Lỗi logout -->
                <div th:if="${param.logout}" class="alert alert-info text-center">
                    Bạn đã đăng xuất thành công.
                </div>

                <form th:action="@{/login}" method="post" id="loginForm">

                    <div class="form-group">
                        <label for="username">Tên đăng nhập</label>
                        <input type="text"
                               name="username"
                               id="username"
                               class="form-control"
                               placeholder="Nhập username"
                               required>
                        <div class="error-message" id="usernameError"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password"
                               name="password"
                               id="password"
                               class="form-control"
                               placeholder="Nhập mật khẩu"
                               required>
                        <div class="error-message" id="passwordError"></div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-login mt-3">
                        Đăng Nhập
                    </button>
                </form>

                <div class="text-center mt-4">
                    Chưa có tài khoản?
                    <a href="/register"><strong>Đăng ký ngay</strong></a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById("loginForm");
    const username = document.getElementById("username");
    const password = document.getElementById("password");
    const usernameError = document.getElementById("usernameError");
    const passwordError = document.getElementById("passwordError");

    form.addEventListener("submit", function (e) {
        let isValid = true;

        // Reset lỗi
        usernameError.innerText = "";
        passwordError.innerText = "";
        username.classList.remove("input-error");
        password.classList.remove("input-error");

        if (username.value.trim() === "") {
            usernameError.innerText = "Username không được để trống";
            username.classList.add("input-error");
            isValid = false;
        }

        if (password.value.trim() === "") {
            passwordError.innerText = "Mật khẩu không được để trống";
            password.classList.add("input-error");
            isValid = false;
        }

        if (!isValid) {
            e.preventDefault();
        }
    });
</script>

</body>
</html>
