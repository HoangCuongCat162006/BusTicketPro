<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .register-container {
            width: 100%;
            max-width: 500px;
        }
        
        .register-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 40px;
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-section h1 {
            font-size: 28px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }
        
        .logo-section p {
            color: #7f8c8d;
            font-size: 14px;
        }
        
        .form-label {
            font-weight: 500;
            color: #34495e;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .form-control {
            height: 48px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            padding: 12px 16px;
            font-size: 14px;
            transition: border-color 0.2s ease;
        }
        
        .form-control:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
            outline: none;
        }
        
        .form-control::placeholder {
            color: #bdc3c7;
        }
        
        .btn-register {
            height: 48px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            background: #3498db;
            border: none;
            transition: all 0.2s ease;
            margin-top: 10px;
        }
        
        .btn-register:hover {
            background: #2980b9;
        }
        
        .alert {
            border-radius: 8px;
            font-size: 14px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }
        
        .input-group-text {
            background: #f8f9fa;
            border: 1px solid #e0e0e0;
            border-right: none;
            border-radius: 8px 0 0 8px;
            color: #7f8c8d;
        }
        
        .input-group .form-control {
            border-left: none;
            border-radius: 0 8px 8px 0;
        }
        
        .input-group:focus-within .input-group-text {
            border-color: #3498db;
            background: white;
        }
        
        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }
        
        .divider span {
            background: white;
            padding: 0 16px;
            color: #95a5a6;
            font-size: 13px;
            position: relative;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #7f8c8d;
        }
        
        .login-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 6px;
        }
        
        .input-error {
            border-color: #e74c3c !important;
        }
        
        .input-error:focus {
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1) !important;
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="register-card">
        <div class="logo-section">
            <h1><i class="fas fa-bus"></i> Bus Ticket Pro</h1>
            <p>Tạo tài khoản mới</p>
        </div>

        <div th:if="${error}"
             class="alert alert-danger"
             th:text="${error}">
        </div>

        <form th:action="@{/register}"
              method="post"
              th:object="${registerRequest}"
              id="registerForm">

            <div class="row g-3 mb-3">
                <!-- USERNAME -->
                <div class="col-md-6">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text"
                               th:field="*{username}"
                               id="username"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('username')} ? 'input-error' : ''"
                               placeholder="Username">
                    </div>
                    <div class="error-message" id="usernameError"
                         th:if="${#fields.hasErrors('username')}"
                         th:errors="*{username}">
                    </div>
                </div>

                <!-- EMAIL -->
                <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email"
                               th:field="*{email}"
                               id="email"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('email')} ? 'input-error' : ''"
                               placeholder="Email">
                    </div>
                    <div class="error-message" id="emailError"
                         th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}">
                    </div>
                </div>
            </div>

            <!-- FULL NAME -->
            <div class="mb-3">
                <label for="fullName" class="form-label">Họ và tên</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-id-card"></i>
                    </span>
                    <input type="text"
                           th:field="*{fullName}"
                           id="fullName"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('fullName')} ? 'input-error' : ''"
                           placeholder="Nhập họ tên">
                </div>
                <div class="error-message" id="fullNameError"
                     th:if="${#fields.hasErrors('fullName')}"
                     th:errors="*{fullName}">
                </div>
            </div>

            <!-- PHONE -->
            <div class="mb-3">
                <label for="phone" class="form-label">Số điện thoại</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-phone"></i>
                    </span>
                    <input type="text"
                           th:field="*{phone}"
                           id="phone"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('phone')} ? 'input-error' : ''"
                           placeholder="Số điện thoại">
                </div>
                <div class="error-message" id="phoneError"
                     th:if="${#fields.hasErrors('phone')}"
                     th:errors="*{phone}">
                </div>
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
                <label for="password" class="form-label">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password"
                           th:field="*{password}"
                           id="password"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('password')} ? 'input-error' : ''"
                           placeholder="Mật khẩu">
                </div>
                <div class="error-message" id="passwordError"
                     th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}">
                </div>
            </div>

            <button type="submit"
                    class="btn btn-primary w-100 btn-register">
                Đăng Ký
            </button>

        </form>

        <div class="divider">
            <span>hoặc</span>
        </div>

        <div class="login-link">
            Đã có tài khoản? 
            <a href="/login">Đăng nhập</a>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById("registerForm");
    const username = document.getElementById("username");
    const email = document.getElementById("email");
    const fullName = document.getElementById("fullName");
    const phone = document.getElementById("phone");
    const password = document.getElementById("password");

    const usernameError = document.getElementById("usernameError");
    const emailError = document.getElementById("emailError");
    const fullNameError = document.getElementById("fullNameError");
    const phoneError = document.getElementById("phoneError");
    const passwordError = document.getElementById("passwordError");

    function clearErrors() {
        usernameError.innerText = "";
        emailError.innerText = "";
        fullNameError.innerText = "";
        phoneError.innerText = "";
        passwordError.innerText = "";

        username.classList.remove("input-error");
        email.classList.remove("input-error");
        fullName.classList.remove("input-error");
        phone.classList.remove("input-error");
        password.classList.remove("input-error");
    }

    form.addEventListener("submit", function (e) {
        let isValid = true;
        clearErrors();

        const usernameValue = username.value.trim();
        if (usernameValue === "") {
            usernameError.innerText = "Username không được để trống";
            username.classList.add("input-error");
            isValid = false;
        } else if (usernameValue.length < 4 || usernameValue.length > 20) {
            usernameError.innerText = "Username phải từ 4-20 ký tự";
            username.classList.add("input-error");
            isValid = false;
        }

        const emailValue = email.value.trim();
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (emailValue === "") {
            emailError.innerText = "Email không được để trống";
            email.classList.add("input-error");
            isValid = false;
        } else if (!emailPattern.test(emailValue)) {
            emailError.innerText = "Email không hợp lệ";
            email.classList.add("input-error");
            isValid = false;
        }

        const fullNameValue = fullName.value.trim();
        if (fullNameValue === "") {
            fullNameError.innerText = "Họ tên không được để trống";
            fullName.classList.add("input-error");
            isValid = false;
        } else if (fullNameValue.length < 2 || fullNameValue.length > 100) {
            fullNameError.innerText = "Họ tên không hợp lệ";
            fullName.classList.add("input-error");
            isValid = false;
        }

        const phoneValue = phone.value.trim();
        const phonePattern = /^0[0-9]{9}$/;
        if (phoneValue === "") {
            phoneError.innerText = "Số điện thoại không được để trống";
            phone.classList.add("input-error");
            isValid = false;
        } else if (!phonePattern.test(phoneValue)) {
            phoneError.innerText = "Số điện thoại không hợp lệ";
            phone.classList.add("input-error");
            isValid = false;
        }

        const passwordValue = password.value;
        if (passwordValue === "") {
            passwordError.innerText = "Mật khẩu không được để trống";
            password.classList.add("input-error");
            isValid = false;
        } else if (passwordValue.length < 6) {
            passwordError.innerText = "Mật khẩu tối thiểu 6 ký tự";
            password.classList.add("input-error");
            isValid = false;
        }

        if (!isValid) {
            e.preventDefault();
        }
    });
</script>

</body>
</html>
