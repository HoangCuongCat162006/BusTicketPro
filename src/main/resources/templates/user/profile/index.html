<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">

    <title>Thông tin cá nhân</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body style="background:#f4f8fb;">

<div class="container mt-5">

    <div class="card shadow mx-auto"
         style="max-width:700px; border-radius:15px;">

        <div class="card-body p-4">

            <h3 class="mb-4">Thông tin cá nhân</h3>

            <div class="form-group">

                <label>Họ tên</label>

                <input type="text"
                       class="form-control"
                       value="Nguyễn Văn A">

            </div>

            <div class="form-group">

                <label>Email</label>

                <input type="email"
                       class="form-control"
                       value="abc@gmail.com">

            </div>

            <div class="form-group">

                <label>Số điện thoại</label>

                <input type="text"
                       class="form-control"
                       value="0123456789">

            </div>

            <button class="btn btn-primary btn-block">

                Cập nhật thông tin

            </button>

        </div>

    </div>

</div>

</body>
</html>
