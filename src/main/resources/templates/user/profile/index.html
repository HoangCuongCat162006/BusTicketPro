<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin cá nhân - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        
        .navbar {
            background: white !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 15px 0;
        }
        
        .navbar-brand {
            font-weight: 600;
            font-size: 20px;
            color: #2c3e50;
        }
        
        .nav-link {
            color: #2c3e50;
            font-weight: 500;
            padding: 10px 20px;
        }
        
        .nav-link:hover {
            color: #3498db;
        }
        
        .profile-card {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            max-width: 700px;
            margin: 30px auto;
        }
        
        .form-label {
            font-weight: 500;
            color: #34495e;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .form-control {
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            padding: 10px 14px;
            font-size: 14px;
        }
        
        .form-control:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
            outline: none;
        }
        
        .btn-primary {
            background: #3498db;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            padding: 10px 20px;
            transition: all 0.2s ease;
        }
        
        .btn-primary:hover {
            background: #2980b9;
        }
        
        .btn-logout {
            background: #e74c3c;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            padding: 8px 16px;
            transition: all 0.2s ease;
        }
        
        .btn-logout:hover {
            background: #c0392b;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
        <a class="navbar-brand" href="/user/home">
            <i class="fas fa-bus"></i> Bus Ticket Pro
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/user/home"><i class="fas fa-home me-2"></i> Trang chủ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/booking"><i class="fas fa-search me-2"></i> Đặt vé</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/my-tickets"><i class="fas fa-ticket-alt me-2"></i> Vé của tôi</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/profile"><i class="fas fa-user me-2"></i> Hồ sơ</a>
                </li>
                <li class="nav-item">
                    <a class="btn btn-logout ms-2" href="/login">
                        <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="profile-card">
        <h4 class="mb-4"><i class="fas fa-user me-2"></i> Thông tin cá nhân</h4>
        
        <form>
            <div class="mb-3">
                <label for="fullName" class="form-label">Họ tên</label>
                <input type="text" class="form-control" id="fullName" value="Nguyễn Văn A">
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" value="abc@gmail.com">
            </div>
            
            <div class="mb-3">
                <label for="phone" class="form-label">Số điện thoại</label>
                <input type="tel" class="form-control" id="phone" value="0123456789">
            </div>
            
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-save me-2"></i> Cập nhật thông tin
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
