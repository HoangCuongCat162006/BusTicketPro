<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vé của tôi - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        .ticket-card { transition: all 0.3s; }
        .ticket-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .status-pending { background-color: #ffc107; color: black; font-weight: bold; }
        .status-paid { background-color: #28a745; color: white; }
        .status-cancelled { background-color: #dc3545; color: white; }
    </style>
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-ticket-alt"></i> Vé của tôi</h2>
        <a href="/" class="btn btn-primary">
            <i class="fas fa-search"></i> Tìm chuyến mới
        </a>
    </div>

    <div class="card ticket-card">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Danh sách vé đã đặt</h5>
        </div>
        <div class="card-body">
            <!-- DANH SÁCH VÉ TỪ DATABASE -->
            <div th:if="${tickets != null and !tickets.isEmpty()}">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Mã vé</th>
                        <th>Tuyến đường</th>
                        <th>Ghế</th>
                        <th>Khởi hành</th>
                        <th>Giá vé</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="ticket : ${tickets}">
                        <td><strong th:text="'#' + ${ticket.ticketCode}"></strong></td>
                        <td>
                            <span th:text="${ticket.departurePoint}"></span>
                            <i class="fas fa-arrow-right mx-2 text-muted"></i>
                            <span th:text="${ticket.destination}"></span>
                        </td>
                        <td><strong th:text="${ticket.seatNumber}"></strong></td>
                        <td th:text="${#dates.format(ticket.departureTime, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${#numbers.formatDecimal(ticket.totalPrice, 1, 0)} + ' VNĐ'"></td>
                        <td>
                                    <span class="badge px-3 py-2"
                                          th:classappend="${ticket.status == 'PENDING'} ? 'status-pending' :
                                                          ${ticket.status == 'PAID'} ? 'status-paid' : 'status-cancelled'"
                                          th:text="${ticket.status == 'PENDING'} ? 'Chờ thanh toán' :
                                                   ${ticket.status == 'PAID'} ? 'Đã thanh toán' : 'Đã hủy'">
                                    </span>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger cancel-btn"
                                    th:if="${ticket.status == 'PENDING'}"
                                    th:data-ticket-id="${ticket.id}"
                                    th:data-ticket-code="${ticket.ticketCode}">
                                <i class="fas fa-times"></i> Hủy vé
                            </button>
                            <span th:if="${ticket.status != 'PENDING'}" class="text-muted small">Không hỗ trợ hủy</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Chưa có vé nào -->
            <div th:if="${tickets == null or tickets.isEmpty()}" class="text-center py-5">
                <i class="fas fa-ticket-alt fa-5x text-muted mb-3"></i>
                <h5 class="text-muted">Bạn chưa có vé nào</h5>
                <a href="/" class="btn btn-primary mt-3">Tìm và đặt vé ngay</a>
            </div>
        </div>
    </div>
</div>

<!-- Modal xác nhận hủy vé -->
<div class="modal fade" id="cancelModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Xác nhận hủy vé</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Bạn có chắc muốn hủy vé <strong id="modalTicketCode"></strong>?</p>
                <small class="text-danger">* Vé chỉ có thể hủy trước 12 giờ so với giờ khởi hành.</small>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-danger" id="confirmCancelBtn">Xác nhận hủy</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentTicketId = null;

    // Xử lý click nút hủy
    document.querySelectorAll('.cancel-btn').forEach(button => {
        button.addEventListener('click', function() {
            currentTicketId = this.getAttribute('data-ticket-id');
            const ticketCode = this.getAttribute('data-ticket-code');
            document.getElementById('modalTicketCode').textContent = '#' + ticketCode;

            new bootstrap.Modal(document.getElementById('cancelModal')).show();
        });
    });

    // Xác nhận hủy
    document.getElementById('confirmCancelBtn').addEventListener('click', function() {
        if (!currentTicketId) return;

        fetch(`/my-tickets/${currentTicketId}/cancel`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
            .then(response => {
                if (response.ok) {
                    alert("✅ Hủy vé thành công!");
                    location.reload();        // Reload trang để cập nhật danh sách
                } else {
                    return response.text().then(text => { throw new Error(text); });
                }
            })
            .catch(error => {
                alert("❌ " + error.message);
            });
    });
</script>
</body>
</html>
