<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt vé xe - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fa; min-height: 100vh; }
        .navbar { background: white !important; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 15px 0; }
        .navbar-brand { font-weight: 600; font-size: 20px; color: #2c3e50; }
        .nav-link { color: #2c3e50; font-weight: 500; padding: 10px 20px; }
        .nav-link:hover { color: #3498db; }
        .section-box { background: white; border-radius: 8px; padding: 28px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .form-label { font-weight: 500; color: #34495e; font-size: 14px; }
        .form-control, .form-select { border-radius: 6px; border: 1px solid #e0e0e0; padding: 10px 14px; font-size: 14px; }
        .form-control:focus, .form-select:focus { border-color: #3498db; box-shadow: 0 0 0 3px rgba(52,152,219,0.1); outline: none; }
        .btn-primary { background: #3498db; border: none; border-radius: 6px; font-weight: 500; padding: 10px 20px; }
        .btn-primary:hover { background: #2980b9; }
        .btn-success { background: #27ae60; border: none; border-radius: 6px; font-weight: 500; padding: 8px 16px; }
        .btn-success:hover { background: #229954; }
        .btn-logout { background: #e74c3c; border: none; border-radius: 6px; font-weight: 500; padding: 8px 16px; color: white; text-decoration: none; }
        .btn-logout:hover { background: #c0392b; color: white; }
        .trip-item { border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; background: #fff; transition: border-color 0.2s; }
        .trip-item:hover { border-color: #3498db; }
        .trip-info h6 { color: #2c3e50; font-weight: 600; margin-bottom: 4px; }
        .trip-info p { color: #7f8c8d; font-size: 13px; margin: 0; }
        .trip-price { color: #3498db; font-weight: 700; font-size: 18px; }
        .seat { width: 44px; height: 44px; border-radius: 6px; border: none; margin: 4px; font-weight: 600; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .seat-available { background: #27ae60; color: white; }
        .seat-available:hover { background: #229954; transform: scale(1.05); }
        .seat-booked   { background: #e74c3c; color: white; cursor: not-allowed; opacity: 0.8; }
        .seat-pending  { background: #f39c12; color: white; cursor: not-allowed; opacity: 0.8; }
        .seat-selected { background: #3498db; color: white; box-shadow: 0 0 0 3px rgba(52,152,219,0.3); }
        .seat-row { display: flex; justify-content: center; margin-bottom: 6px; }
        .aisle { width: 24px; }
        .legend span { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; margin-right: 16px; }
        .dot { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }
        .alert { border-radius: 6px; border: none; font-size: 14px; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
        <a class="navbar-brand" href="/user/home"><i class="fas fa-bus"></i> Bus Ticket Pro</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/user/home"><i class="fas fa-home me-1"></i> Trang chủ</a></li>
                <li class="nav-item"><a class="nav-link active" href="/booking"><i class="fas fa-search me-1"></i> Đặt vé</a></li>
                <li class="nav-item"><a class="nav-link" href="/my-tickets"><i class="fas fa-ticket-alt me-1"></i> Vé của tôi</a></li>
                <li class="nav-item"><a class="nav-link" href="/profile"><i class="fas fa-user me-1"></i> Hồ sơ</a></li>
                <li class="nav-item">
                    <form th:action="@{/auth/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-logout ms-2">
                            <i class="fas fa-sign-out-alt me-1"></i> Đăng xuất
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- BƯỚC 1: TÌM CHUYẾN -->
    <div class="section-box">
        <div class="d-flex align-items-center gap-3 mb-4">
            <a href="/user/home" class="btn btn-secondary">
                <i class="fas fa-arrow-left me-1"></i> Quay lại
            </a>
            <h5 class="mb-0"><i class="fas fa-search me-2 text-primary"></i> Tìm chuyến xe</h5>
        </div>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Điểm đi</label>
                <select class="form-select" id="departureSelect">
                    <option value="">-- Chọn điểm đi --</option>
                    <!-- Load từ DB qua Thymeleaf -->
                    <option th:each="loc : ${locations}"
                            th:value="${loc.id}"
                            th:text="${loc.name}">
                    </option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Điểm đến</label>
                <select class="form-select" id="arrivalSelect">
                    <option value="">-- Chọn điểm đến --</option>
                    <option th:each="loc : ${locations}"
                            th:value="${loc.id}"
                            th:text="${loc.name}">
                    </option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Ngày đi</label>
                <input type="date" class="form-control" id="departureDate"
                       th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
            </div>
        </div>
        <button class="btn btn-primary mt-3" id="searchBtn">
            <i class="fas fa-search me-2"></i> Tìm chuyến
        </button>
    </div>

    <!-- BƯỚC 2: DANH SÁCH CHUYẾN -->
    <div id="tripListSection" class="section-box" style="display:none;">
        <h5 class="mb-3"><i class="fas fa-list me-2 text-primary"></i> Danh sách chuyến phù hợp</h5>
        <div id="tripListContent"></div>
    </div>

    <!-- BƯỚC 3: SƠ ĐỒ GHẾ + THÔNG TIN HÀNH KHÁCH -->
    <div id="seatSection" class="section-box" style="display:none;">
        <h5 class="mb-1"><i class="fas fa-chair me-2 text-primary"></i> Chọn ghế</h5>
        <p class="text-muted mb-3" id="tripSummary"></p>

        <!-- Loading -->
        <div id="loadingSeats" class="text-center py-4" style="display:none;">
            <div class="spinner-border text-primary"></div>
            <p class="mt-2 text-muted">Đang tải sơ đồ ghế...</p>
        </div>

        <!-- Seat map -->
        <div id="seatContainer" style="display:none;"></div>

        <!-- Chú thích -->
        <div class="legend my-3" id="seatLegend" style="display:none;">
            <span><span class="dot" style="background:#27ae60;"></span> Còn trống</span>
            <span><span class="dot" style="background:#3498db;"></span> Đang chọn</span>
            <span><span class="dot" style="background:#f39c12;"></span> Đang giữ</span>
            <span><span class="dot" style="background:#e74c3c;"></span> Đã đặt</span>
        </div>

        <div class="alert alert-info" id="selectedInfo" style="display:none;">
            Ghế đang chọn: <strong id="selectedSeatsText">Chưa chọn</strong>
        </div>

        <!-- Form thông tin hành khách -->
        <div id="passengerForm" style="display:none;">
            <hr>
            <h6 class="mb-3"><i class="fas fa-user me-2"></i> Thông tin hành khách</h6>
            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <label class="form-label">Họ tên <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="passengerName" placeholder="Nhập họ tên">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                    <input type="tel" class="form-control" id="passengerPhone" placeholder="Nhập SĐT">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" id="passengerEmail" placeholder="Nhập email">
                </div>
            </div>
            <button class="btn btn-primary" id="confirmBookingBtn">
                <i class="fas fa-check-circle me-2"></i> Xác nhận đặt vé
            </button>
        </div>

        <!-- Kết quả đặt vé -->
        <div id="bookingResult" class="mt-3" style="display:none;"></div>
    </div>

</div>

<script>
    // ========== STATE ==========
    let currentTripId   = null;
    let selectedSeatId  = null;
    let selectedSeatNum = null;
    let seatData        = [];

    // ========== BƯỚC 1: TÌM CHUYẾN ==========
    document.getElementById('searchBtn').addEventListener('click', function () {
        const departureId = document.getElementById('departureSelect').value;
        const arrivalId   = document.getElementById('arrivalSelect').value;
        const date        = document.getElementById('departureDate').value;

        if (!departureId || !arrivalId || !date) {
            alert('Vui lòng chọn đầy đủ điểm đi, điểm đến và ngày đi.');
            return;
        }
        if (departureId === arrivalId) {
            alert('Điểm đi và điểm đến không được trùng nhau.');
            return;
        }

        const btn = this;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Đang tìm...';

        fetch(`/booking/api/trips?departureId=${departureId}&arrivalId=${arrivalId}&date=${date}`)
            .then(r => r.json())
            .then(trips => {
                renderTripList(trips);
                document.getElementById('tripListSection').style.display = 'block';
                document.getElementById('seatSection').style.display = 'none';
            })
            .catch(() => alert('Lỗi khi tìm chuyến. Vui lòng thử lại.'))
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-search me-2"></i> Tìm chuyến';
            });
    });

    // ========== RENDER DANH SÁCH CHUYẾN ==========
    function renderTripList(trips) {
        const container = document.getElementById('tripListContent');
        if (trips.length === 0) {
            container.innerHTML = '<div class="alert alert-warning">Không tìm thấy chuyến xe phù hợp.</div>';
            return;
        }

        container.innerHTML = trips.map(trip => {
            const depTime = new Date(trip.departureTime);
            const timeStr = depTime.toLocaleString('vi-VN');
            const price   = trip.price.toLocaleString('vi-VN') + 'đ';
            const seats   = trip.availableSeats + '/' + trip.totalSeats + ' ghế trống';

            return `
                <div class="trip-item">
                    <div class="trip-info">
                        <h6>${trip.routeName}</h6>
                        <p><i class="fas fa-clock me-1"></i>${timeStr}
                           &nbsp;|&nbsp;
                           <i class="fas fa-bus me-1"></i>${trip.busPlate}
                           &nbsp;|&nbsp;
                           <i class="fas fa-chair me-1"></i>${seats}
                        </p>
                    </div>
                    <div class="text-end">
                        <div class="trip-price mb-2">${price}</div>
                        <button class="btn btn-success btn-sm"
                                onclick="selectTrip(${trip.tripId}, '${trip.routeName}', '${timeStr}', '${price}')">
                            <i class="fas fa-chair me-1"></i> Chọn ghế
                        </button>
                    </div>
                </div>`;
        }).join('');
    }

    // ========== BƯỚC 2: CHỌN CHUYẾN → LOAD SƠ ĐỒ GHẾ ==========
    function selectTrip(tripId, routeName, timeStr, price) {
        currentTripId = tripId;
        selectedSeatId  = null;
        selectedSeatNum = null;

        document.getElementById('tripSummary').textContent =
            routeName + ' | ' + timeStr + ' | ' + price;
        document.getElementById('seatSection').style.display = 'block';
        document.getElementById('passengerForm').style.display = 'none';
        document.getElementById('bookingResult').style.display = 'none';
        document.getElementById('selectedInfo').style.display = 'none';

        loadSeats(tripId);
        document.getElementById('seatSection').scrollIntoView({ behavior: 'smooth' });
    }

    // ========== LOAD SƠ ĐỒ GHẾ ==========
    function loadSeats(tripId) {
        document.getElementById('loadingSeats').style.display = 'block';
        document.getElementById('seatContainer').style.display = 'none';
        document.getElementById('seatLegend').style.display = 'none';

        fetch(`/booking/api/seats?tripId=${tripId}`)
            .then(r => r.json())
            .then(data => {
                seatData = data.seats;
                renderSeatMap(data.seats);
                document.getElementById('loadingSeats').style.display = 'none';
                document.getElementById('seatContainer').style.display = 'block';
                document.getElementById('seatLegend').style.display = 'block';
                document.getElementById('selectedInfo').style.display = 'block';
            })
            .catch(() => {
                document.getElementById('loadingSeats').innerHTML =
                    '<p class="text-danger">Lỗi tải sơ đồ ghế. Vui lòng thử lại.</p>';
            });
    }

    // ========== RENDER SƠ ĐỒ GHẾ ==========
    function renderSeatMap(seats) {
        const container = document.getElementById('seatContainer');
        container.innerHTML = '';

        // Nhóm theo hàng (A, B, C...)
        const rows = {};
        seats.forEach(seat => {
            const row = seat.seatNumber.charAt(0);
            if (!rows[row]) rows[row] = [];
            rows[row].push(seat);
        });

        Object.keys(rows).sort().forEach(row => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'seat-row';

            const sorted = rows[row].sort((a, b) => {
                return parseInt(a.seatNumber.slice(1)) - parseInt(b.seatNumber.slice(1));
            });

            sorted.forEach((seat, idx) => {
                const btn = document.createElement('button');
                btn.className = 'seat';
                btn.textContent = seat.seatNumber;
                btn.dataset.seatId  = seat.id;
                btn.dataset.seatNum = seat.seatNumber;

                if (seat.status === 'BOOKED') {
                    btn.classList.add('seat-booked');
                    btn.disabled = true;
                    btn.title = 'Ghế đã được đặt';
                } else if (seat.status === 'PENDING') {
                    btn.classList.add('seat-pending');
                    btn.disabled = true;
                    btn.title = 'Ghế đang được giữ';
                } else {
                    btn.classList.add('seat-available');
                    btn.addEventListener('click', () => toggleSeat(seat, btn));
                }

                rowDiv.appendChild(btn);

                // Thêm lối đi giữa ghế số 2 và 3 (nếu có nhiều hơn 2 cột)
                if ((idx + 1) % 2 === 0 && idx < sorted.length - 1) {
                    const aisle = document.createElement('div');
                    aisle.className = 'aisle';
                    rowDiv.appendChild(aisle);
                }
            });

            container.appendChild(rowDiv);
        });
    }

    // ========== CHỌN / BỎ CHỌN GHẾ ==========
    function toggleSeat(seat, btn) {
        // Bỏ chọn ghế cũ nếu đang chọn ghế khác
        if (selectedSeatId && selectedSeatId !== seat.id) {
            const prevBtn = document.querySelector(`button[data-seat-id="${selectedSeatId}"]`);
            if (prevBtn) {
                prevBtn.classList.remove('seat-selected');
                prevBtn.classList.add('seat-available');
                // Mở khóa ghế cũ
                unlockSeat(selectedSeatId);
            }
        }

        if (selectedSeatId === seat.id) {
            // Bỏ chọn ghế hiện tại
            btn.classList.remove('seat-selected');
            btn.classList.add('seat-available');
            unlockSeat(seat.id);
            selectedSeatId  = null;
            selectedSeatNum = null;
        } else {
            // Chọn ghế mới
            btn.classList.remove('seat-available');
            btn.classList.add('seat-selected');
            lockSeat(seat.id);
            selectedSeatId  = seat.id;
            selectedSeatNum = seat.seatNumber;
        }

        updateUI();
    }

    function updateUI() {
        const text = selectedSeatNum || 'Chưa chọn';
        document.getElementById('selectedSeatsText').textContent = text;
        document.getElementById('passengerForm').style.display =
            selectedSeatId ? 'block' : 'none';
    }

    // ========== LOCK / UNLOCK GHẾ ==========
    function lockSeat(seatId) {
        fetch(`/booking/api/seats/${seatId}/lock`, { method: 'POST' })
            .catch(() => console.warn('Lock seat failed'));
    }

    function unlockSeat(seatId) {
        fetch(`/booking/api/seats/${seatId}/unlock`, { method: 'POST' })
            .catch(() => console.warn('Unlock seat failed'));
    }

    // ========== BƯỚC 3: XÁC NHẬN ĐẶT VÉ ==========
    document.getElementById('confirmBookingBtn').addEventListener('click', function () {
        const name  = document.getElementById('passengerName').value.trim();
        const phone = document.getElementById('passengerPhone').value.trim();
        const email = document.getElementById('passengerEmail').value.trim();

        if (!name || !phone || !email) {
            alert('Vui lòng nhập đầy đủ thông tin hành khách.');
            return;
        }

        const phoneRegex = /^0[0-9]{9,10}$/;
        if (!phoneRegex.test(phone)) {
            alert('Số điện thoại không hợp lệ.');
            return;
        }

        if (!selectedSeatId || !currentTripId) {
            alert('Vui lòng chọn ghế trước khi đặt vé.');
            return;
        }

        this.disabled = true;
        this.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Đang xử lý...';

        const payload = {
            tripId:        currentTripId,
            seatId:        selectedSeatId,
            passengerName:  name,
            passengerPhone: phone,
            passengerEmail: email
        };

        fetch('/booking/api/book-ticket', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
            .then(r => {
                if (r.ok) return r.json();
                return r.text().then(t => { throw new Error(t); });
            })
            .then(ticket => {
                const result = document.getElementById('bookingResult');
                result.style.display = 'block';
                result.innerHTML = `
                <div class="alert alert-success">
                    <h6><i class="fas fa-check-circle me-2"></i> Đặt vé thành công!</h6>
                    <p class="mb-1">Mã vé: <strong>${ticket.ticketCode}</strong></p>
                    <p class="mb-1">Hành khách: ${ticket.passengerName}</p>
                    <p class="mb-1">Ghế: ${selectedSeatNum}</p>
                    <p class="mb-0 text-warning">⚠ Vui lòng thanh toán để xác nhận vé (hiệu lực 15 phút).</p>
                </div>`;

                // Reset sau 5 giây
                setTimeout(() => {
                    selectedSeatId = null;
                    selectedSeatNum = null;
                    loadSeats(currentTripId);
                    document.getElementById('passengerForm').style.display = 'none';
                    document.getElementById('selectedInfo').style.display = 'none';
                    result.style.display = 'none';
                }, 6000);
            })
            .catch(err => {
                const result = document.getElementById('bookingResult');
                result.style.display = 'block';
                result.innerHTML = `
                <div class="alert alert-danger">
                    <h6><i class="fas fa-times-circle me-2"></i> Đặt vé thất bại!</h6>
                    <p class="mb-0">${err.message}</p>
                </div>`;
                // Reload ghế để cập nhật trạng thái mới nhất
                setTimeout(() => loadSeats(currentTripId), 2000);
            })
            .finally(() => {
                this.disabled = false;
                this.innerHTML = '<i class="fas fa-check-circle me-2"></i> Xác nhận đặt vé';
            });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
