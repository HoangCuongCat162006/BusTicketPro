<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">

    <title>Đặt vé xe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: #f4f8fb;
        }

        .search-box{
            background: white;
            border-radius: 15px;
            padding: 30px;
        }

        .trip-card{
            border: none;
            border-radius: 15px;
        }

        .seat{
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: none;
            margin: 5px;
            font-weight: bold;
        }

        .seat-available{
            background: #28a745;
            color: white;
        }

        .seat-booked{
            background: #dc3545;
            color: white;
        }

        .seat-selected{
            background: #007bff;
            color: white;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <!-- SEARCH -->
    <div class="search-box shadow mb-5">

        <h3 class="mb-4">Tìm chuyến xe</h3>

        <form>

            <div class="form-row">

                <div class="form-group col-md-4">

                    <label>Điểm đi</label>

                    <select class="form-control">

                        <option>Hà Nội</option>
                        <option>Đà Nẵng</option>
                        <option>Hồ Chí Minh</option>

                    </select>

                </div>

                <div class="form-group col-md-4">

                    <label>Điểm đến</label>

                    <select class="form-control">

                        <option>Đà Nẵng</option>
                        <option>Huế</option>
                        <option>Nha Trang</option>

                    </select>

                </div>

                <div class="form-group col-md-4">

                    <label>Ngày đi</label>

                    <input type="date"
                           class="form-control">

                </div>

            </div>

            <button class="btn btn-primary btn-block">

                Tìm chuyến xe

            </button>

        </form>

    </div>

    <!-- DANH SÁCH CHUYẾN -->
    <div class="card shadow trip-card mb-4">

        <div class="card-body">

            <div class="d-flex justify-content-between">

                <div>

                    <h4>Hà Nội → Đà Nẵng</h4>

                    <p class="text-muted">
                        Khởi hành: 08:00 - 12/05/2026
                    </p>

                </div>

                <div class="text-right">

                    <h4 class="text-primary">
                        350.000đ
                    </h4>

                    <button class="btn btn-success">

                        Chọn ghế

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- SƠ ĐỒ GHẾ -->
    <div class="card shadow trip-card">

        <div class="card-body">

            <h4 class="mb-4">Chọn ghế</h4>

            <div class="mb-4">

                <button class="seat seat-available">A1</button>

                <button class="seat seat-selected">A2</button>

                <button class="seat seat-booked">A3</button>

                <button class="seat seat-available">A4</button>

                <button class="seat seat-available">A5</button>

            </div>

            <div class="mb-4">

                <span class="badge badge-success">
                    Ghế trống
                </span>

                <span class="badge badge-primary">
                    Ghế đang chọn
                </span>

                <span class="badge badge-danger">
                    Đã đặt
                </span>

            </div>

            <div class="alert alert-info">

                Ghế đang chọn:
                <b>A2</b>

            </div>

            <button class="btn btn-primary btn-block">

                Xác nhận đặt vé

            </button>

        </div>

    </div>

</div>

</body>
</html>
